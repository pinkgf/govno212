<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить технику</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .add-form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .add-form-container h1 {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn-submit {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-submit:hover {
            background: #229954;
        }
        
        .btn-cancel {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-cancel:hover {
            background: #7f8c8d;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="nav-brand">🏫 Техникум</a>
            <ul class="nav-menu">
                <li><a href="/">Главная</a></li>
                <li><a href="/about">О техникуме</a></li>
                <li><a href="/contacts">Контакты</a></li>
                <li><a href="/dashboard">Каталог</a></li>
            </ul>
        </div>
    </nav>

    <div class="add-form-container">
        <h1>➕ Добавление новой техники</h1>
        <form id="addForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>Название *</label>
                <input type="text" name="name" required>
            </div>
            
            <div class="form-group">
                <label>Категория *</label>
                <select name="category" required>
                    <option value="">Выберите категорию</option>
                    <option value="Электроника">Электроника</option>
                    <option value="Механика">Механика</option>
                    <option value="Программное обеспечение">Программное обеспечение</option>
                    <option value="Оборудование">Оборудование</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Описание</label>
                <textarea name="description" rows="4"></textarea>
            </div>
            
            <div class="form-group">
                <label>Цена *</label>
                <input type="number" name="price" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Фото</label>
                <input type="file" name="photo" accept="image/*">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-submit">✅ Добавить</button>
                <a href="/dashboard" class="btn-cancel">❌ Отмена</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            const response = await fetch('/api/techniques', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                alert('✅ Техника успешно добавлена!');
                window.location.href = '/dashboard';
            } else {
                const error = await response.json();
                alert('❌ Ошибка: ' + (error.error || 'Неизвестная ошибка'));
            }
        });
    </script>
</body>
</html>
